[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=14.2",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-mmacosx-version-min=14.2",
]

[env]
MACOSX_DEPLOYMENT_TARGET = { value = "14.2", force = true }
CMAKE_OSX_DEPLOYMENT_TARGET = "14.2"
# Points sherpa-onnx-sys's build.rs at the prebuilt libs vendored under
# src-tauri/vendor/sherpa-onnx/lib. The vendor dir is gitignored — the
# download-sherpa-onnx setup step fetches the zip from upstream releases.
# Path is resolved relative to this config.toml (frontend/src-tauri/.cargo/).
SHERPA_ONNX_LIB_DIR = { value = "../vendor/sherpa-onnx/lib", relative = true }